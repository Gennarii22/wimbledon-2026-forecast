name: Update Wimbledon forecast

on:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno 06:00 UTC durante il torneo
  workflow_dispatch: {}    # avvio manuale

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Rebuild data + forecast
        working-directory: pipeline
        run: |
          python3 live_update.py

      - name: Commit refreshed forecast
        run: |
          git config user.name  "wimbledon-bot"
          git config user.email "actions@github.com"
          git add site/data data/tennis.db
          if git diff --cached --quiet; then
            echo "Nessun cambiamento."
          else
            git commit -m "auto: refresh forecast $(date -u +%Y-%m-%d)"
            git push
          fi
